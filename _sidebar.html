    <script>
    // mark active link based on current filename
    (function(){
        const path = location.pathname.split('/').pop();
        const key = path.replace('.html','') || 'dashboard';
        document.querySelectorAll('.nav-link-item').forEach(a=>{
            if (a.dataset.key === key) a.classList.add('active');
        });
        // user info (optional): read from localStorage if set
        const name = localStorage.getItem('sikemas_user_name');
        const role = localStorage.getItem('sikemas_user_role');
        if (name) document.getElementById('userName').textContent = name;
        if (role) document.getElementById('userRole').textContent = role;
        if (name) document.getElementById('userAvatar').textContent = name.charAt(0).toUpperCase();
    })();
